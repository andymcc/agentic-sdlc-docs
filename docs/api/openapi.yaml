openapi: "3.1.0"
info:
  title: Agentic SDLC App
  version: 0.1.0
  description: API reference for the agentic SDLC application.

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /healthz:
    get:
      summary: Health check
      description: Returns the health status of the service.
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
